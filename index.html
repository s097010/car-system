<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小太陽車隊填寫系統</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    padding: 15px;
}

/* ================= 登入遮罩 ================= */
#loginPage {
    position: fixed;
    inset: 0;
    background: rgba(242,242,242,0.98);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.login-box {
    width: 320px;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* ================= 你原本 UI（完全不動） ================= */
.container {
    max-width: 520px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
}

label {
    font-weight: bold;
    margin-top: 10px;
    display: block;
}

select, input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
}

.addBtn { background: #28a745; color: white; }
.genBtn { background: #007bff; color: white; }

.card {
    border: 1px solid #ddd;
    padding: 15px;
    margin-top: 15px;
    border-radius: 10px;
    background: #fafafa;
}

/* ================= 管理員區 ================= */
#adminPanel {
    display:none;
    margin-top:20px;
    padding:10px;
    background:#fff3cd;
    border-radius:10px;
}

.admin-card {
    background:#fff;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
}
</style>
</head>

<body>

<!-- ================= 登入 ================= -->
<div id="loginPage">
    <div class="login-box">
        <h3>🔐 車隊系統登入</h3>

        <input id="user" placeholder="帳號">
        <input id="pass" type="password" placeholder="密碼">

        <button onclick="login()">登入</button>

        <p style="font-size:12px;color:gray;">
            admin1 / 1234<br>
            admin2 / 5678<br>
            admin3 / 9999<br>
            user1 / 0000
        </p>
    </div>
</div>

<!-- ================= 主系統（UI完全保留） ================= -->
<div class="container" id="app">

<h2>🚚 小太陽車隊填寫系統</h2>

<label>📅 日期</label>
<input type="date" id="date">

<label>車牌</label>
<select id="car">
    <option value="" disabled selected>請選擇車牌</option>
    <option>XO-249</option>
    <option>KLE-9999</option>
    <option>KLH-1568</option>
    <option>KLG-6028</option>
</select>

<label>發貨站</label>
<select id="send">
    <option value="" disabled selected>請選擇發貨站</option>
    <option>亞洲水泥</option>
    <option>台灣水泥</option>
    <option>東南水泥</option>
    <option>永覲工業</option>
    <option>晉瑜水泥</option>
    <option>環球水泥</option>
</select>

<label>收貨站</label>
<select id="receive">
    <option value="" disabled selected>請選擇收貨站</option>
</select>

<label>料名</label>
<select id="material">
    <option value="" disabled selected>請選擇料名</option>
</select>

<label>噸數</label>
<input id="weight">

<hr>

<h3>🧴 尿素</h3>
<label>品牌</label>
<select id="ureaBrand">
    <option value="" disabled selected>請選擇</option>
    <option>品牌A</option>
    <option>品牌B</option>
</select>

<label>公升</label>
<input id="ureaL">

<label>金額</label>
<input id="ureaMoney">

<hr>

<h3>⛽ 油料</h3>
<label>加油站</label>
<select id="fuelStation">
    <option value="" disabled selected>請選擇</option>
    <option>中油</option>
    <option>速邁樂</option>
    <option>台糖</option>
</select>

<label>公升</label>
<input id="fuelL">

<label>金額</label>
<input id="fuelMoney">

<button class="addBtn" onclick="addTrip()">➕ 新增車次</button>

<div id="list"></div>

<!-- ================= 管理員區 ================= -->
<div id="adminPanel">
    <h3>👑 管理後台</h3>
    <div id="adminList"></div>
</div>

</div>

<script>

let currentUser = null;
let trips = [];

const users = {
    "admin1":"1234",
    "admin2":"5678",
    "admin3":"9999",
    "user1":"0000"
};

function isAdmin(u){
    return ["admin1","admin2","admin3"].includes(u);
}

/* ================= 登入 ================= */
function login(){

    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(!users[u] || users[u] !== p){
        alert("帳號或密碼錯誤");
        return;
    }

    currentUser = u;

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("app").style.display = "block";

    init();

    updateAdminPanel();
    render();
}

/* ================= 初始化 ================= */
function init(){
    document.getElementById("date").value =
        new Date().toISOString().split('T')[0];
}

/* ================= 新增車次 ================= */
function addTrip(){

    if(!currentUser){
        alert("請先登入");
        return;
    }

    let data = {
        date: document.getElementById("date").value,
        car: document.getElementById("car").value,
        send: document.getElementById("send").value,
        receive: document.getElementById("receive").value,
        material: document.getElementById("material").value,
        weight: document.getElementById("weight").value
    };

    trips.push(data);

    render();
    updateAdminPanel();
}

/* ================= 使用者列表 ================= */
function render(){

    let list = document.getElementById("list");
    list.innerHTML = "";

    trips.forEach((t,i)=>{
        list.innerHTML += `
        <div class="card">
            ${i+1}. ${t.date}<br>
            ${t.car}<br>
            ${t.send} → ${t.receive}<br>
            ${t.material}<br>
            ${t.weight}
        </div>`;
    });
}

/* ================= 管理員後台（修正核心） ================= */
function updateAdminPanel(){

    let panel = document.getElementById("adminPanel");
    let box = document.getElementById("adminList");

    box.innerHTML = "";

    if(!isAdmin(currentUser)){
        panel.style.display = "none";
        return;
    }

    panel.style.display = "block";

    trips.forEach((t,i)=>{
        box.innerHTML += `
        <div class="admin-card">
            <b>#${i+1}</b><br>
            ${t.car} / ${t.send}<br>
            ${t.date}<br>
            <button onclick="delTrip(${i})">刪除</button>
        </div>`;
    });
}

/* ================= 刪除 ================= */
function delTrip(i){
    trips.splice(i,1);
    render();
    updateAdminPanel();
}

</script>

</body>
</html>
