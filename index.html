<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小太陽車隊填寫系統</title>

<!-- ================= PWA 必要設定 ================= -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    padding: 15px;
}

.container {
    max-width: 520px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
}

label {
    font-weight: bold;
    margin-top: 10px;
    display: block;
}

select, input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

select:invalid {
    color: gray;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

.addBtn {
    background: #28a745;
    color: white;
}

.genBtn {
    background: #007bff;
    color: white;
}

.result {
    margin-top: 20px;
    padding: 15px;
    background: #e9f5ff;
    border-radius: 10px;
    white-space: pre-line;
}

.card {
    border: 1px solid #ddd;
    padding: 15px;
    margin-top: 15px;
    border-radius: 10px;
    background: #fafafa;
}
</style>
</head>

<body>
<div class="container">

<!-- ================= 登入區 ================= -->
<h3>🔐 登入</h3>

<label>帳號</label>
<select id="role">
    <option value="" disabled selected>請選擇身份</option>
    <option value="admin">管理員</option>
    <option value="driver">司機</option>
</select>

<button onclick="login()" class="addBtn">登入系統</button>

<hr>
<div class="container">
    <h2>🚚 小太陽車隊填寫系統</h2>

    <!-- 日期 -->
    <label>📅 日期</label>
    <input type="date" id="date">

    <!-- 車牌 -->
    <label>車牌</label>
    <select id="car">
        <option value="" disabled selected>請選擇車牌</option>
        <option>XO-249</option>
        <option>KLE-9999</option>
        <option>KLH-1568</option>
        <option>KLG-6028</option>
    </select>

    <!-- 發貨站 -->
    <label>發貨站</label>
    <select id="send">
        <option value="" disabled selected>請選擇發貨站</option>
        <option>亞洲水泥</option>
        <option>台灣水泥</option>
        <option>東南水泥</option>
        <option>永覲工業</option>
        <option>晉瑜水泥</option>
        <option>環球水泥</option>
    </select>

    <!-- 收貨站 -->
    <label>收貨站</label>
    <select id="receive">
        <option value="" disabled selected>請選擇收貨站</option>
    </select>

    <!-- 料名 -->
    <label>料名</label>
    <select id="material">
        <option value="" disabled selected>請先選發貨站</option>
    </select>

    <!-- 噸數 -->
    <label>噸數</label>
    <input type="number" id="weight" placeholder="請輸入噸數">

    <hr>

    <h3>🧴 尿素補給</h3>

    <label>尿素品牌</label>
    <select id="ureaBrand">
        <option value="" disabled selected>請選擇尿素品牌</option>
        <option>品牌A</option>
        <option>品牌B</option>
    </select>

    <label>尿素公升數</label>
    <input type="number" id="ureaL">

    <label>尿素金額</label>
    <input type="number" id="ureaMoney">

    <hr>

    <h3>⛽ 油料補給</h3>

    <label>加油站</label>
    <select id="fuelStation">
        <option value="" disabled selected>請選擇加油站</option>
        <option>中油</option>
        <option>速邁樂</option>
        <option>台糖</option>
    </select>

    <label>油料公升數</label>
    <input type="number" id="fuelL">

    <label>油料金額</label>
    <input type="number" id="fuelMoney">

    <button class="addBtn" onclick="addTrip()">➕ 新增車次</button>
    <button class="genBtn" onclick="generateAll()">📋 產生全部內容</button>

    <div id="list"></div>
    <div class="result" id="result"></div>
</div>

<script>

const materialData = {
    "亞洲水泥": ["Ⅰ型水泥"],
    "台灣水泥": ["Ⅰ型水泥", "Ⅱ型水泥", "IL型水泥"],
    "東南水泥": ["Ⅰ型水泥"],
    "永覲工業": ["爐石粉"],
    "晉瑜水泥": ["Ⅰ型水泥", "Ⅱ型水泥", "高爐水泥"],
    "環球水泥": ["Ⅰ型水泥"]
};

const receiveMap = {
    "亞洲水泥": ["亞東安平", "亞東永康"],
    "台灣水泥": ["鳳勝高樹"],
    "東南水泥": ["天誠預拌","信濃預拌","東南高良"],
    "永覲工業": ["亞東永康","亞東安平"],
    "晉瑜水泥": ["亞東安平","鳳勝高樹"],
    "環球水泥": ["東南高良"]
};

let trips = [];

/* ================= 初始化 ================= */
window.onload = function () {

    // 📅 預設今天日期
    let today = new Date().toISOString().split('T')[0];
    document.getElementById("date").value = today;

    updateMaterial();
    updateReceive();
};

/* ================= service worker（PWA核心） ================= */
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}

/* ================= 發貨站變更 ================= */
document.getElementById("send").addEventListener("change", function () {
    updateMaterial();
    updateReceive();
});

/* ================= 料名 ================= */
function updateMaterial() {
    let send = document.getElementById("send").value;
    let material = document.getElementById("material");

    material.innerHTML = '<option value="" disabled selected>請選擇料名</option>';

    if (!materialData[send]) return;

    materialData[send].forEach(item => {
        let opt = document.createElement("option");
        opt.value = item;
        opt.text = item;
        material.appendChild(opt);
    });
}

/* ================= 收貨站 ================= */
function updateReceive() {
    let send = document.getElementById("send").value;
    let receive = document.getElementById("receive");

    receive.innerHTML = '<option value="" disabled selected>請選擇收貨站</option>';

    if (!receiveMap[send]) return;

    receiveMap[send].forEach(item => {
        let opt = document.createElement("option");
        opt.value = item;
        opt.text = item;
        receive.appendChild(opt);
    });
}

/* ================= 新增車次 ================= */
function addTrip() {

    let date = document.getElementById("date").value;

    let car = document.getElementById("car").value;
    let send = document.getElementById("send").value;
    let receive = document.getElementById("receive").value;
    let material = document.getElementById("material").value;
    let weight = document.getElementById("weight").value;

    let ureaBrand = document.getElementById("ureaBrand").value;
    let ureaL = document.getElementById("ureaL").value;
    let ureaMoney = document.getElementById("ureaMoney").value;

    let fuelStation = document.getElementById("fuelStation").value;
    let fuelL = document.getElementById("fuelL").value;
    let fuelMoney = document.getElementById("fuelMoney").value;

    if (!date || !car || !send || !receive || !material || !weight) {
        alert("請完整填寫資料");
        return;
    }

    if (!receiveMap[send].includes(receive)) {
        alert("收貨站錯誤");
        return;
    }

    trips.push({
        date, car, send, receive, material, weight,
        ureaBrand, ureaL, ureaMoney,
        fuelStation, fuelL, fuelMoney
    });

    renderList();
}

/* ================= 顯示 ================= */
function renderList() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    trips.forEach((t, i) => {
        list.innerHTML += `
        <div class="card">
            📅 ${t.date}<br>
            🚚 車次 ${i + 1}<br>
            車牌：${t.car}<br>
            發貨：${t.send}<br>
            收貨：${t.receive}<br>
            料名：${t.material}<br>
            噸數：${t.weight} 噸<br><br>

            🧴 尿素：${t.ureaBrand || "-"} / ${t.ureaL || 0}L / $${t.ureaMoney || 0}<br>
            ⛽ 油料：${t.fuelStation || "-"} / ${t.fuelL || 0}L / $${t.fuelMoney || 0}
        </div>`;
    });
}

/* ================= 匯出 ================= */
function generateAll() {

    if (trips.length === 0) {
        alert("沒有車次");
        return;
    }

    let text = "";

    trips.forEach((t, i) => {
        text += `📅 ${t.date}
車次 ${i + 1}
車牌：${t.car}
發貨：${t.send}
收貨：${t.receive}
料名：${t.material}
噸數：${t.weight} 噸

尿素：${t.ureaBrand || "-"} / ${t.ureaL || 0}L / $${t.ureaMoney || 0}
油料：${t.fuelStation || "-"} / ${t.fuelL || 0}L / $${t.fuelMoney || 0}

`;
    });

    document.getElementById("result").innerText = text;
}

</script>

</body>
</html>
