<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小太陽車隊系統</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    padding: 15px;
}

/* ============ 登入畫面 ============ */
#loginPage {
    max-width: 400px;
    margin: 100px auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* ============ 主系統 ============ */
#app {
    display: none; /* 🔴 一開始完全隱藏 */
    max-width: 520px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- ================= 登入頁 ================= -->
<div id="loginPage">
    <h2>🔐 登入系統</h2>

    <input id="user" placeholder="帳號">
    <input id="pass" type="password" placeholder="密碼">

    <button onclick="login()">登入</button>

    <p style="font-size:12px;color:gray;">
        admin1/1234<br>
        admin2/5678<br>
        admin3/9999<br>
        user1/0000
    </p>
</div>

<!-- ================= 主系統 ================= -->
<div id="app">

<h2>🚚 車隊系統</h2>

<label>車牌</label>
<select id="car">
    <option>XO-249</option>
    <option>KLE-9999</option>
</select>

<label>發貨站</label>
<select id="send">
    <option>亞洲水泥</option>
    <option>台灣水泥</option>
</select>

<label>噸數</label>
<input id="weight">

<button onclick="add()">新增</button>

<div id="list"></div>

</div>

<script>

/* ================= 帳號 ================= */
const users = {
    "admin1":"1234",
    "admin2":"5678",
    "admin3":"9999",
    "user1":"0000"
};

let loginUser = null;
let data = [];

/* ================= 登入 ================= */
function login() {

    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if (!users[u] || users[u] !== p) {
        alert("帳號或密碼錯誤");
        return;
    }

    loginUser = u;

    // 🔴 隱藏登入頁
    document.getElementById("loginPage").style.display = "none";

    // 🟢 顯示主系統
    document.getElementById("app").style.display = "block";

    alert("登入成功：" + u);
}

/* ================= 新增 ================= */
function add() {

    if (!loginUser) {
        alert("請先登入");
        return;
    }

    let car = document.getElementById("car").value;
    let send = document.getElementById("send").value;
    let weight = document.getElementById("weight").value;

    data.push({car, send, weight});

    render();
}

/* ================= 顯示 ================= */
function render() {

    let list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach((d,i)=>{
        list.innerHTML += `
        <div style="margin-top:10px;padding:10px;background:#eee;border-radius:10px;">
            ${i+1}. ${d.car} / ${d.send} / ${d.weight}
        </div>`;
    });
}

</script>

</body>
</html>
