<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小太陽車隊填寫系統</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    padding: 15px;
}

/* ================= 登入遮罩 ================= */
#loginPage {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.login-box {
    width: 320px;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.login-box input {
    width:100%;
    padding:10px;
    margin-top:10px;
}

.login-box button {
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:10px;
}

/* ================= 主系統（完全保留你原本UI） ================= */
.container {
    max-width: 520px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    display:none; /* 🔴 未登入隱藏 */
}

h2 {
    text-align: center;
}

label {
    font-weight: bold;
    margin-top: 10px;
    display: block;
}

select, input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

.addBtn {
    background: #28a745;
    color: white;
}

.genBtn {
    background: #007bff;
    color: white;
}

.card {
    border: 1px solid #ddd;
    padding: 15px;
    margin-top: 15px;
    border-radius: 10px;
    background: #fafafa;
}
</style>
</head>

<body>

<!-- ================= 登入頁 ================= -->
<div id="loginPage">
    <div class="login-box">
        <h2>🔐 車隊系統登入</h2>

        <input id="user" placeholder="帳號">
        <input id="pass" type="password" placeholder="密碼">

        <button onclick="login()">登入</button>

        <p style="font-size:12px;color:gray;">
            admin1 / 1234<br>
            admin2 / 5678<br>
            admin3 / 9999<br>
            user1 / 0000
        </p>
    </div>
</div>

<!-- ================= 你的原始系統（完整保留） ================= -->
<div class="container" id="app">

<h2>🚚 小太陽車隊填寫系統</h2>

<label>📅 日期</label>
<input type="date" id="date">

<label>車牌</label>
<select id="car">
    <option value="" disabled selected>請選擇車牌</option>
    <option>XO-249</option>
    <option>KLE-9999</option>
    <option>KLH-1568</option>
    <option>KLG-6028</option>
</select>

<label>發貨站</label>
<select id="send">
    <option value="" disabled selected>請選擇發貨站</option>
    <option>亞洲水泥</option>
    <option>台灣水泥</option>
    <option>東南水泥</option>
    <option>永覲工業</option>
    <option>晉瑜水泥</option>
    <option>環球水泥</option>
</select>

<label>收貨站</label>
<select id="receive">
    <option value="" disabled selected>請選擇收貨站</option>
</select>

<label>料名</label>
<select id="material">
    <option value="" disabled selected>請選擇料名</option>
</select>

<label>噸數</label>
<input id="weight">

<hr>

<h3>🧴 尿素</h3>
<label>品牌</label>
<select id="ureaBrand">
    <option value="" disabled selected>請選擇</option>
    <option>品牌A</option>
    <option>品牌B</option>
</select>

<label>公升</label>
<input id="ureaL">

<label>金額</label>
<input id="ureaMoney">

<hr>

<h3>⛽ 油料</h3>
<label>加油站</label>
<select id="fuelStation">
    <option value="" disabled selected>請選擇</option>
    <option>中油</option>
    <option>速邁樂</option>
    <option>台糖</option>
</select>

<label>公升</label>
<input id="fuelL">

<label>金額</label>
<input id="fuelMoney">

<button class="addBtn" onclick="addTrip()">➕ 新增車次</button>

<div id="list"></div>

</div>

<script>

/* ================= 帳號 ================= */
const users = {
    "admin1":"1234",
    "admin2":"5678",
    "admin3":"9999",
    "user1":"0000"
};

let currentUser = null;
let trips = [];

/* ================= 登入 ================= */
function login() {

    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if (!users[u] || users[u] !== p) {
        alert("帳號或密碼錯誤");
        return;
    }

    currentUser = u;

    // 🔴 關掉登入頁
    document.getElementById("loginPage").style.display = "none";

    // 🟢 顯示原本完整系統
    document.getElementById("app").style.display = "block";

    init();
}

/* ================= 初始化 ================= */
function init() {
    document.getElementById("date").value =
        new Date().toISOString().split('T')[0];
}

/* ================= 原本邏輯（未動） ================= */
const materialData = {
    "亞洲水泥":["Ⅰ型水泥"],
    "台灣水泥":["Ⅰ型水泥","Ⅱ型水泥","IL型水泥"],
    "東南水泥":["Ⅰ型水泥"],
    "永覲工業":["爐石粉"],
    "晉瑜水泥":["Ⅰ型水泥","Ⅱ型水泥","高爐水泥"],
    "環球水泥":["Ⅰ型水泥"]
};

const receiveMap = {
    "亞洲水泥":["亞東安平","亞東永康"],
    "台灣水泥":["鳳勝高樹"],
    "東南水泥":["天誠預拌","信濃預拌","東南高良"],
    "永覲工業":["亞東永康","亞東安平"],
    "晉瑜水泥":["亞東安平","鳳勝高樹"],
    "環球水泥":["東南高良"]
};

document.getElementById("send").addEventListener("change",()=>{
    updateMaterial();
    updateReceive();
});

function updateMaterial(){
    let send=document.getElementById("send").value;
    let m=document.getElementById("material");

    m.innerHTML='<option value="">請選擇料名</option>';

    if(!materialData[send]) return;

    materialData[send].forEach(x=>{
        let o=document.createElement("option");
        o.value=x;
        o.text=x;
        m.appendChild(o);
    });
}

function updateReceive(){
    let send=document.getElementById("send").value;
    let r=document.getElementById("receive");

    r.innerHTML='<option value="">請選擇收貨站</option>';

    if(!receiveMap[send]) return;

    receiveMap[send].forEach(x=>{
        let o=document.createElement("option");
        o.value=x;
        o.text=x;
        r.appendChild(o);
    });
}

/* ================= 新增車次 ================= */
function addTrip(){

    if(!currentUser){
        alert("請先登入");
        return;
    }

    let data={
        date:document.getElementById("date").value,
        car:document.getElementById("car").value,
        send:document.getElementById("send").value,
        receive:document.getElementById("receive").value,
        material:document.getElementById("material").value,
        weight:document.getElementById("weight").value
    };

    trips.push(data);

    render();
}

/* ================= 顯示 ================= */
function render(){

    let list=document.getElementById("list");
    list.innerHTML="";

    trips.forEach((t,i)=>{
        list.innerHTML+=`
        <div class="card">
            ${i+1}. ${t.date}<br>
            ${t.car}<br>
            ${t.send} → ${t.receive}<br>
            ${t.material}<br>
            ${t.weight}
        </div>`;
    });
}

</script>

</body>
</html>
