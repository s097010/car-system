<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小太陽車隊系統</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    padding: 15px;
}

/* ================= 登入頁 ================= */
.login-box {
    max-width: 400px;
    margin: 80px auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #007bff;
    color: white;
    font-size: 16px;
}

/* ================= 主系統 ================= */
.container {
    max-width: 520px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    display: none; /* 🔴 未登入隱藏 */
}

label { font-weight: bold; }
select, input { width: 100%; padding: 10px; margin-top: 5px; }

.card {
    background: #f9f9f9;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- ================= 登入畫面 ================= -->
<div class="login-box" id="loginBox">
    <h2>🔐 車隊系統登入</h2>

    <input id="username" placeholder="帳號">
    <input id="password" type="password" placeholder="密碼">

    <button onclick="login()">登入</button>
</div>

<!-- ================= 主系統 ================= -->
<div class="container" id="mainApp">

<h2>🚚 小太陽車隊系統</h2>

<label>📅 日期</label>
<input type="date" id="date">

<label>車牌</label>
<select id="car">
    <option>XO-249</option>
    <option>KLE-9999</option>
    <option>KLH-1568</option>
</select>

<label>發貨站</label>
<select id="send">
    <option>亞洲水泥</option>
    <option>台灣水泥</option>
</select>

<label>收貨站</label>
<select id="receive"></select>

<label>料名</label>
<select id="material"></select>

<label>噸數</label>
<input id="weight">

<button onclick="addTrip()">➕ 新增車次</button>

<div id="list"></div>

</div>

<script>

/* ================= 帳號資料 ================= */
const users = {
    "admin1": {password:"1234", role:"admin"},
    "admin2": {password:"5678", role:"admin"},
    "admin3": {password:"9999", role:"admin"},
    "user1":  {password:"0000", role:"user"}
};

let currentUser = null;
let trips = [];

/* ================= 登入 ================= */
function login() {

    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    if (!users[u] || users[u].password !== p) {
        alert("帳號或密碼錯誤");
        return;
    }

    currentUser = users[u];

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("mainApp").style.display = "block";

    alert("登入成功：" + currentUser.role);

    init();
}

/* ================= 初始化 ================= */
function init() {

    document.getElementById("date").value =
        new Date().toISOString().split('T')[0];

}

/* ================= 新增車次（登入後才可） ================= */
function addTrip() {

    if (!currentUser) {
        alert("請先登入");
        return;
    }

    let car = document.getElementById("car").value;
    let send = document.getElementById("send").value;
    let weight = document.getElementById("weight").value;

    if (!car || !send || !weight) {
        alert("請填資料");
        return;
    }

    trips.push({car, send, weight});

    render();
}

/* ================= 顯示 ================= */
function render() {

    let list = document.getElementById("list");
    list.innerHTML = "";

    trips.forEach((t,i)=>{
        list.innerHTML += `
        <div class="card">
            車次 ${i+1}<br>
            車牌：${t.car}<br>
            發貨：${t.send}<br>
            噸數：${t.weight}
        </div>`;
    });
}

</script>

</body>
</html>
