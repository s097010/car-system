<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小太陽車隊填寫系統</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    padding: 15px;
}

/* ================= 登入 ================= */
#loginPage {
    position: fixed;
    inset: 0;
    background: rgba(242,242,242,0.98);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.login-box {
    width: 320px;
    background: white;
    padding: 20px;
    border-radius: 15px;
}

/* ================= UI（完全保留） ================= */
.container {
    max-width: 520px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h2 { text-align: center; }

label {
    font-weight: bold;
    margin-top: 10px;
    display: block;
}

select, input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
}

.addBtn { background: #28a745; color: white; }

#topBar {
    display:none;
    justify-content: space-between;
    align-items: center;
    background:#eee;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

.card {
    border: 1px solid #ddd;
    padding: 15px;
    margin-top: 15px;
    border-radius: 10px;
    background: #fafafa;
}

#adminPanel {
    display:none;
    margin-top:20px;
    padding:10px;
    background:#fff3cd;
    border-radius:10px;
}

.admin-card {
    background:#fff;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
}
</style>
</head>

<body>

<!-- ================= 登入 ================= -->
<div id="loginPage">
    <div class="login-box">
        <h3>🔐 登入</h3>
        <input id="user" placeholder="帳號">
        <input id="pass" type="password" placeholder="密碼">
        <button onclick="login()">登入</button>
    </div>
</div>

<!-- ================= 主系統 ================= -->
<div class="container" id="app">

<h2>🚚 小太陽車隊填寫系統</h2>

<div id="topBar">
    <div>👤 <span id="loginName"></span></div>
    <button onclick="logout()" style="width:auto;padding:8px 12px;">登出</button>
</div>

<label>日期</label>
<input type="date" id="date">

<label>車牌</label>
<select id="car">
    <option value="" disabled selected>請選擇車牌</option>
    <option>XO-249</option>
    <option>KLE-9999</option>
    <option>KLH-1568</option>
    <option>KLG-6028</option>
</select>

<label>發貨站</label>
<select id="send">
    <option value="" disabled selected>請選擇發貨站</option>
    <option>亞洲水泥</option>
    <option>台灣水泥</option>
    <option>東南水泥</option>
    <option>永覲工業</option>
    <option>晉瑜水泥</option>
    <option>環球水泥</option>
</select>

<label>收貨站</label>
<select id="receive">
    <option value="" disabled selected>請先選發貨站</option>
</select>

<label>料名</label>
<select id="material">
    <option value="" disabled selected>請先選發貨站</option>
</select>

<label>噸數</label>
<input id="weight">

<button class="addBtn" onclick="addTrip()">➕ 新增車次</button>

<div id="list"></div>

<div id="adminPanel">
    <h3>👑 管理後台</h3>
    <div id="adminList"></div>
</div>

</div>

<script>

let currentUser=null;
let trips=[];

const users={
"admin1":"1234",
"admin2":"5678",
"admin3":"9999",
"user1":"0000"
};

/* ================= 防呆：料名 ================= */
const materialData={
"亞洲水泥":["Ⅰ型水泥"],
"台灣水泥":["Ⅰ型水泥","Ⅱ型水泥","IL型水泥"],
"東南水泥":["Ⅰ型水泥"],
"永覲工業":["爐石粉"],
"晉瑜水泥":["Ⅰ型水泥","高爐水泥"],
"環球水泥":["Ⅰ型水泥"]
};

/* ================= 防呆：收貨站（你要的核心） ================= */
const receiveMap={
"亞洲水泥":["亞東安平","亞東永康"],
"台灣水泥":["鳳勝高樹"],
"東南水泥":["天誠預拌","信濃預拌"],
"永覲工業":["亞東安平"],
"晉瑜水泥":["鳳勝高樹"],
"環球水泥":["東南高良"]
};

function isAdmin(u){
return ["admin1","admin2","admin3"].includes(u);
}

/* ================= 登入 ================= */
function login(){

let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(!users[u]||users[u]!==p){
alert("錯誤");
return;
}

currentUser=u;

document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("loginName").innerText=u;
document.getElementById("topBar").style.display="flex";

init();
render();
renderAdmin();
}

/* ================= 登出 ================= */
function logout(){
location.reload();
}

/* ================= 初始化 ================= */
function init(){
document.getElementById("date").value=
new Date().toISOString().split("T")[0];
}

/* ================= 發貨站變更（料名 + 收貨站） ================= */
document.getElementById("send").addEventListener("change",function(){

let send=this.value;

/* 料名 */
let m=document.getElementById("material");
m.innerHTML='<option disabled selected>請選料名</option>';

if(materialData[send]){
materialData[send].forEach(v=>{
let o=document.createElement("option");
o.value=v;o.text=v;
m.appendChild(o);
});
}

/* 收貨站 */
let r=document.getElementById("receive");
r.innerHTML='<option disabled selected>請選收貨站</option>';

if(receiveMap[send]){
receiveMap[send].forEach(v=>{
let o=document.createElement("option");
o.value=v;o.text=v;
r.appendChild(o);
});
}
});

/* ================= 新增車次 ================= */
function addTrip(){

let send=document.getElementById("send").value;
let receive=document.getElementById("receive").value;

/* 🔥 防呆：收貨站驗證 */
if(receiveMap[send] && !receiveMap[send].includes(receive)){
alert("收貨站與發貨站不符");
return;
}

let t={
date:document.getElementById("date").value,
car:document.getElementById("car").value,
send,
receive,
material:document.getElementById("material").value,
weight:document.getElementById("weight").value
};

trips.push(t);

render();
renderAdmin();
}

/* ================= 列表 ================= */
function render(){

let list=document.getElementById("list");
list.innerHTML="";

trips.forEach((t,i)=>{
list.innerHTML+=`
<div class="card">
${i+1}. ${t.date}<br>
${t.car}<br>
${t.send} → ${t.receive}<br>
${t.material}<br>
${t.weight}
</div>`;
});
}

/* ================= 管理員 ================= */
function renderAdmin(){

let box=document.getElementById("adminList");
let panel=document.getElementById("adminPanel");

box.innerHTML="";

if(!isAdmin(currentUser)){
panel.style.display="none";
return;
}

panel.style.display="block";

trips.forEach((t,i)=>{
box.innerHTML+=`
<div class="admin-card">
#${i+1} ${t.car}<br>
<button onclick="del(${i})">刪除</button>
</div>`;
});
}

/* ================= 刪除 ================= */
function del(i){
trips.splice(i,1);
render();
renderAdmin();
}

</script>

</body>
</html>
